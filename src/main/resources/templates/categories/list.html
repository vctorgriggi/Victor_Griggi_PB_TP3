<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias - Sistema CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: nav}"></nav>
<div class="container mt-4">
    <h1>Lista de Categorias</h1>

    <!-- Mensagens de sucesso/erro -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert"
         id="success-alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert"
         id="error-alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <a th:href="@{/categories/new}" class="btn btn-primary mb-3" id="btn-new">Nova Categoria</a>

    <div th:if="${#lists.isEmpty(categories)}" class="alert alert-info" id="empty-message">
        Nenhuma categoria cadastrada.
    </div>

    <table th:if="${!#lists.isEmpty(categories)}" class="table table-striped table-hover" id="categories-table">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.id}"></td>
            <td th:text="${category.name}"></td>
            <td th:text="${category.description}"></td>
            <td>
                <a th:href="@{/categories/edit/{id}(id=${category.id})}"
                   class="btn btn-warning btn-sm btn-edit">Editar</a>
                <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post"
                      style="display:inline"
                      onsubmit="return confirm('Tem certeza que deseja excluir esta categoria?')">
                    <button type="submit" class="btn btn-danger btn-sm btn-delete">Excluir</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
