<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.id != null} ? 'Editar Categoria' : 'Nova Categoria'">Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: nav}"></nav>
<div class="container mt-4">
    <h1 th:text="${category.id != null} ? 'Editar Categoria' : 'Cadastrar Categoria'" id="form-title"></h1>

    <!-- Mensagem de erro do servidor -->
    <div th:if="${error}" class="alert alert-danger" role="alert" id="server-error">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/categories/save}" th:object="${category}" method="post" id="category-form"
          novalidate>
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="name" class="form-label">Nome *</label>
            <input type="text" class="form-control" id="name" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" maxlength="100">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
            </div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Descrição</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="3"
                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                      maxlength="500"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success" id="btn-save">Salvar</button>
            <a th:href="@{/categories}" class="btn btn-secondary" id="btn-cancel">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
