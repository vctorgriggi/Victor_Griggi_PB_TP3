<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Sistema CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Lista de Produtos</h1>

    <!-- Mensagens de sucesso/erro -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert"
         id="success-alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert"
         id="error-alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <a th:href="@{/products/new}" class="btn btn-primary mb-3" id="btn-new">Novo Produto</a>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info" id="empty-message">
        Nenhum produto cadastrado.
    </div>

    <table th:if="${!#lists.isEmpty(products)}" class="table table-striped table-hover" id="products-table">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.description}"></td>
            <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></td>
            <td th:text="${product.quantity}"></td>
            <td>
                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                   class="btn btn-warning btn-sm btn-edit">Editar</a>
                <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post"
                      style="display:inline"
                      onsubmit="return confirm('Tem certeza que deseja excluir este produto?')">
                    <button type="submit" class="btn btn-danger btn-sm btn-delete">Excluir</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
